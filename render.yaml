# Render Blueprint — deploys the API + a managed PostgreSQL database.
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: push this repo to GitHub, then in Render → "New +" → "Blueprint",
# point it at the repo. Render reads this file, provisions the DB and web service.
# After first deploy, set the secret env vars marked `sync: false` in the dashboard.

services:
  - type: web
    name: thai-farmer-agent
    runtime: python
    plan: free
    region: singapore            # closest Render region to Thailand (lower latency, data locality)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: APP_ENV
        value: production
      # Managed Postgres connection string (auto-injected from the database below).
      - key: DATABASE_URL
        fromDatabase:
          name: farmeragent-db
          property: connectionString
      # --- LLM: Anthropic Claude ---
      # Requires an Anthropic API key with credits (NOT a claude.ai subscription).
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_MODEL
        value: claude-3-5-sonnet-latest
      - key: ANTHROPIC_API_KEY
        sync: false              # set in dashboard (secret)
      # --- Embeddings ---
      # Offline hashing embedder by default (Anthropic has no embeddings API).
      - key: EMBEDDINGS_PROVIDER
        value: hashing
      # --- Admin portal ---
      - key: ADMIN_TOKEN
        generateValue: true      # Render generates a strong token
      # --- LINE Messaging API ---
      - key: LINE_CHANNEL_SECRET
        sync: false              # set in dashboard (secret)
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false              # set in dashboard (secret)

databases:
  - name: farmeragent-db
    plan: free
    region: singapore
