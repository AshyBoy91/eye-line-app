<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <title>Admin · Compare LLMs</title>
  <style>
    body { font-family: Arial, "Noto Sans Thai", sans-serif; margin: 24px; color: #1b2733; }
    h1 { color: #0f4c5c; }
    nav a { margin-right: 14px; color: #2a9d8f; text-decoration: none; font-weight: bold; }
    .badges { display:flex; gap:10px; margin: 12px 0 20px; flex-wrap:wrap; }
    .badge { padding:4px 12px; border-radius:999px; font-size:12px; font-weight:600; }
    .badge.ok  { background:#d4edda; color:#155724; }
    .badge.off { background:#f8d7da; color:#721c24; }
    form { max-width: 860px; }
    label { display:block; font-size:13px; font-weight:bold; margin:14px 0 4px; color:#264653; }
    input[type=text], textarea {
      width:100%; padding:9px 11px; font-size:14px; border:1px solid #cdd8dc; border-radius:8px;
      font-family:inherit;
    }
    textarea { height:90px; resize:vertical; }
    button[type=submit] {
      margin-top:14px; padding:10px 28px; background:#2a9d8f; color:#fff; font-size:15px;
      font-weight:700; border:0; border-radius:8px; cursor:pointer;
    }
    button:disabled { opacity:.55; cursor:not-allowed; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:24px; max-width:1200px; }
    .panel { border:1px solid #d5dee2; border-radius:12px; overflow:hidden; }
    .panel-head {
      padding:10px 16px; font-weight:700; font-size:14px; color:#fff;
      display:flex; justify-content:space-between; align-items:center;
    }
    .panel-head.anthropic { background:#0f4c5c; }
    .panel-head.openai    { background:#2a9d8f; }
    .panel-meta { font-size:12px; font-weight:400; opacity:.85; }
    .panel-body { padding:16px; min-height:120px; font-size:14px; line-height:1.6;
                  white-space:pre-wrap; color:#1b2733; background:#fff; }
    .panel-body.loading { color:#aaa; font-style:italic; }
    .panel-body.error   { color:#c0392b; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.4);
               border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; margin-left:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .diff-badge { margin-top:10px; font-size:12px; color:#6b7b86; }
  </style>
</head>
<body>
  <h1>⚖️ LLM Response Comparison</h1>
  <nav>
    <a href="/admin/conversations?token={{ token }}">Conversations</a>
    <a href="/admin/faq?token={{ token }}">FAQ</a>
    <a href="/admin/compare?token={{ token }}">⚖️ Compare LLMs</a>
    <a href="/admin/logout">Logout</a>
  </nav>

  <div class="badges">
    <span class="badge {{ 'ok' if anthropic_ready else 'off' }}">
      Claude ({{ anthropic_model }}) — {{ '✓ Ready' if anthropic_ready else '✗ No API key' }}
    </span>
    <span class="badge {{ 'ok' if openai_ready else 'off' }}">
      OpenAI ({{ openai_model }}) — {{ '✓ Ready' if openai_ready else '✗ No API key' }}
    </span>
  </div>

  <form id="cmpForm">
    <label for="question">Question / คำถาม</label>
    <input id="question" name="question" type="text" placeholder="ข้าวใบเหลืองควรทำอย่างไร" required autofocus/>
    <label for="context">Context / ข้อมูลอ้างอิง (optional — paste FAQ chunk to test grounding)</label>
    <textarea id="context" name="context" placeholder="Leave blank for free-form response. Paste a FAQ body to test grounded answers."></textarea>
    <button type="submit" id="submitBtn">Compare both models</button>
  </form>

  <div class="grid" id="grid" style="display:none">
    <div class="panel">
      <div class="panel-head anthropic">
        <span>🤖 Claude <span id="claude-model" class="panel-meta"></span></span>
        <span id="claude-ms" class="panel-meta"></span>
      </div>
      <div class="panel-body loading" id="claude-body">Waiting...</div>
    </div>
    <div class="panel">
      <div class="panel-head openai">
        <span>🟢 OpenAI <span id="openai-model" class="panel-meta"></span></span>
        <span id="openai-ms" class="panel-meta"></span>
      </div>
      <div class="panel-body loading" id="openai-body">Waiting...</div>
    </div>
  </div>
  <div id="diff-note" class="diff-badge" style="display:none"></div>

<script>
  document.getElementById('cmpForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = 'Comparing <span class="spinner"></span>';

    const grid = document.getElementById('grid');
    grid.style.display = 'grid';
    ['claude','openai'].forEach(p => {
      document.getElementById(p+'-body').className = 'panel-body loading';
      document.getElementById(p+'-body').textContent = 'Generating...';
      document.getElementById(p+'-ms').textContent = '';
    });

    const fd = new FormData(e.target);
    fd.append('token', '{{ token }}');

    try {
      const resp = await fetch('/admin/api/compare?token={{ token }}', { method:'POST', body: fd });
      const data = await resp.json();

      for (const [provider, key] of [['anthropic','claude'],['openai','openai']]) {
        const d = data[provider] || {};
        const body = document.getElementById(key+'-body');
        body.className = 'panel-body' + (d.reply?.startsWith('❌') ? ' error' : '');
        body.textContent = d.reply || '—';
        document.getElementById(key+'-model').textContent = d.model ? `· ${d.model}` : '';
        document.getElementById(key+'-ms').textContent = d.latency_ms ? `${d.latency_ms} ms` : '';
      }

      // Simple length diff note
      const cLen = (data.anthropic?.reply || '').length;
      const oLen = (data.openai?.reply || '').length;
      const note = document.getElementById('diff-note');
      note.style.display = 'block';
      note.textContent = `Claude: ${cLen} chars · OpenAI: ${oLen} chars · Δ ${Math.abs(cLen-oLen)} chars`;
    } catch(err) {
      ['claude','openai'].forEach(p => {
        document.getElementById(p+'-body').className = 'panel-body error';
        document.getElementById(p+'-body').textContent = 'Request failed: ' + err.message;
      });
    }

    btn.disabled = false;
    btn.textContent = 'Compare both models';
  });
</script>
</body>
</html>
