<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>Admin · Edit FAQ</title>
  <style>
    body { font-family: Arial, "Noto Sans Thai", sans-serif; margin: 24px; color: #1b2733; }
    h1, h2 { color: #0f4c5c; }
    nav a { margin-right: 14px; color: #2a9d8f; text-decoration: none; font-weight: bold; }
    form { border: 1px solid #d5dee2; border-radius: 8px; padding: 16px 20px; max-width: 680px; }
    label { display:block; font-size: 13px; margin: 10px 0 3px; color:#41525c; font-weight:600; }
    input, textarea, select { width: 100%; padding: 7px 9px; border:1px solid #c8d2d7; border-radius:5px; font-family:inherit; font-size:14px; }
    textarea { height: 120px; resize: vertical; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .actions { display:flex; gap:10px; margin-top:14px; }
    button[type=submit] { background:#2a9d8f; color:#fff; border:0; padding:9px 22px; border-radius:6px; cursor:pointer; font-size:14px; font-weight:700; }
    .cancel { padding:9px 18px; border:1px solid #cdd8dc; border-radius:6px; color:#41525c; text-decoration:none; font-size:14px; }
    .meta { font-size:12px; color:#6b7b86; margin-top:10px; }
  </style>
</head>
<body>
  <h1>Edit FAQ Entry</h1>
  <nav>
    <a href="/admin/conversations?token={{ token }}">Conversations</a>
    <a href="/admin/faq?token={{ token }}">FAQ</a>
    <a href="/admin/compare?token={{ token }}">⚖️ Compare LLMs</a>
    <a href="/admin/logout">Logout</a>
  </nav>

  <form method="post" action="/admin/faq/{{ doc.id }}/edit?token={{ token }}" style="margin-top:18px;">
    <label>Title</label>
    <input name="title" value="{{ doc.title }}" required />

    <div class="row2">
      <div>
        <label>Category</label>
        <input name="category" value="{{ doc.category }}" placeholder="rice / soil / pests / crop / government_incentive / false_news_alert" required />
      </div>
      <div>
        <label>Status</label>
        <select name="status">
          <option value="published" {{ 'selected' if doc.status == 'published' }}>published</option>
          <option value="draft" {{ 'selected' if doc.status == 'draft' }}>draft</option>
          <option value="archived" {{ 'selected' if doc.status == 'archived' }}>archived</option>
        </select>
      </div>
    </div>

    <label>Source (authoritative)</label>
    <input name="source" value="{{ doc.source or '' }}" placeholder="กรมการข้าว" />

    <label>Body (Thai)</label>
    <textarea name="body_th" required>{{ doc.body_th }}</textarea>

    <div class="row2">
      <div>
        <label>Valid from (optional)</label>
        <input name="valid_from" type="date" value="{{ doc.valid_from.strftime('%Y-%m-%d') if doc.valid_from else '' }}" />
      </div>
      <div>
        <label>Valid to / Expiry (optional)</label>
        <input name="valid_to" type="date" value="{{ doc.valid_to.strftime('%Y-%m-%d') if doc.valid_to else '' }}" />
      </div>
    </div>

    <div class="actions">
      <button type="submit">Save &amp; re-index</button>
      <a href="/admin/faq?token={{ token }}" class="cancel">Cancel</a>
    </div>

    <div class="meta">
      ID: {{ doc.id[:8] }} · Version: {{ doc.version }} · 
      Updated: {{ doc.updated_at.strftime('%Y-%m-%d %H:%M') }} · 
      {{ doc.chunks|length }} chunks
    </div>
  </form>
</body>
</html>
