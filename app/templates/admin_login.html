<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · Sign in</title>
  <style>
    body { font-family: Arial, "Noto Sans Thai", sans-serif; background:#f2f6f7; color:#1b2733;
           display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; }
    .card { background:#fff; border:1px solid #d5dee2; border-radius:12px; padding:32px;
            width:320px; box-shadow:0 6px 20px rgba(15,76,92,0.08); }
    h1 { color:#0f4c5c; font-size:20px; margin:0 0 4px; }
    p.sub { color:#6b7b86; font-size:13px; margin:0 0 20px; }
    label { display:block; font-size:13px; font-weight:bold; margin-bottom:6px; color:#264653; }
    input[type=password] { width:100%; box-sizing:border-box; padding:10px 12px; font-size:15px;
            border:1px solid #cdd8dc; border-radius:8px; margin-bottom:16px; }
    button { width:100%; padding:11px; font-size:15px; font-weight:bold; color:#fff; background:#2a9d8f;
            border:0; border-radius:8px; cursor:pointer; }
    button:hover { background:#248277; }
    .err { background:#fde8e3; color:#c1442a; font-size:13px; padding:9px 12px; border-radius:8px;
           margin-bottom:16px; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/admin/login">
    <h1>Admin sign in</h1>
    <p class="sub">Thai Farmer LINE Agent</p>
    {% if error %}<div class="err">Incorrect password. Please try again.</div>{% endif %}
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autofocus required />
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
